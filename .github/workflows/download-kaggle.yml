name: Download Kaggle Dataset

on:
  workflow_dispatch:

# ⭐ مهم: در این بخش، دسترسی توکن را افزایش می‌دهیم
permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Kaggle credentials
      run: |
        mkdir -p ~/.kaggle
        # توجه: متغیرها باید با نام قبلی تطابق داشته باشند
        echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json
        pip install kaggle

    - name: Download the dataset
      run: |
        kaggle datasets download valakhorasani/divar-real-estate-dataset1m-persian-property-ads

    - name: Commit and push the dataset to the repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add divar-real-estate-dataset1m-persian-property-ads.zip
        git commit -m "Add downloaded dataset [skip ci]" || echo "No changes to commit"
        git push
