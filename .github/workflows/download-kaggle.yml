name: Download Kaggle Dataset

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create Download folder
      run: |
        mkdir -p Download

    - name: Setup Kaggle API
      run: |
        mkdir -p ~/.kaggle
        echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json
        pip install kaggle

    - name: Download dataset into the Download folder
      run: |
        kaggle datasets download valakhorasani/divar-real-estate-dataset1m-persian-property-ads -p Download

    - name: Commit and push the downloaded file
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add Download/
        git commit -m "Add downloaded dataset to Download folder [skip ci]" || echo "No changes to commit"
        git push
