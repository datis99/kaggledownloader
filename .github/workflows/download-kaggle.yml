name: Download Kaggle Dataset

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Kaggle API
      run: |
        pip install kaggle
        mkdir -p ~/.kaggle
    
    - name: Configure Kaggle API
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      run: |
        echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json
    
    - name: Download dataset
      run: |
        kaggle datasets download valakhorasani/divar-real-estate-dataset1m-persian-property-ads
    
    - name: Move to repository folder
      run: |
        mkdir -p dataset-folder
        mv divar-real-estate-dataset1m-persian-property-ads.zip dataset-folder/
    
    - name: Commit and push to repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add dataset-folder/
        git commit -m "Add dataset directly to repo [skip ci]" || echo "No changes to commit"
        git push
